<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thời Khóa Biểu Học Toán</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      overflow-x: auto;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 35px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      color: white;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #c4b5fd, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #cbd5e1;
      font-size: 16px;
    }

    .form-box {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    input, select {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    input:focus,
    select:focus {
      border-color: #a78bfa;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 10px rgba(167,139,250,0.5);
    }

    select option {
      color: black;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .main-btn {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: white;
      box-shadow: 0 5px 15px rgba(99,102,241,0.4);
    }

    .main-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 20px rgba(99,102,241,0.6);
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 20px;
      min-width: 900px;
    }

    th {
      background: rgba(99,102,241,0.35);
      color: white;
      padding: 18px;
      font-size: 16px;
      backdrop-filter: blur(10px);
    }

    td {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px;
      vertical-align: top;
      min-height: 120px;
      height: 120px;
    }

    .lesson {
      background: linear-gradient(135deg, rgba(139,92,246,0.9), rgba(99,102,241,0.9));
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      color: white;
      animation: fadeIn 0.4s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .lesson strong {
      font-size: 15px;
    }

    .lesson p {
      margin-top: 6px;
      font-size: 14px;
      color: #e0e7ff;
    }

    .delete-btn {
      margin-top: 10px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 7px 12px;
      border-radius: 10px;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: rgba(239,68,68,0.9);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 30px;
      }

      .form-box {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📘 Math Schedule</h1>
    <div class="subtitle">Hệ thống đăng ký thời khóa biểu học Toán hiện đại</div>

    <div class="form-box">
      <input type="text" id="name" placeholder="Tên học sinh" />

      <select id="day">
        <option value="Thứ 2">Thứ 2</option>
        <option value="Thứ 3">Thứ 3</option>
        <option value="Thứ 4">Thứ 4</option>
        <option value="Thứ 5">Thứ 5</option>
        <option value="Thứ 6">Thứ 6</option>
        <option value="Thứ 7">Thứ 7</option>
        <option value="Chủ nhật">Chủ nhật</option>
      </select>

      <select id="time">
        <option value="Sáng">Sáng</option>
        <option value="Chiều">Chiều</option>
        <option value="Tối">Tối</option>
      </select>

      <input type="text" id="topic" placeholder="Nội dung học Toán" />

      <button class="main-btn" onclick="addSchedule()">✨ Thêm vào thời khóa biểu</button>
    </div>

    <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Buổi</th>
          <th>Thứ 2</th>
          <th>Thứ 3</th>
          <th>Thứ 4</th>
          <th>Thứ 5</th>
          <th>Thứ 6</th>
          <th>Thứ 7</th>
          <th>Chủ nhật</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th>Sáng</th>
          <td id="Thứ 2-Sáng"></td>
          <td id="Thứ 3-Sáng"></td>
          <td id="Thứ 4-Sáng"></td>
          <td id="Thứ 5-Sáng"></td>
          <td id="Thứ 6-Sáng"></td>
          <td id="Thứ 7-Sáng"></td>
          <td id="Chủ nhật-Sáng"></td>
        </tr>
        <tr>
          <th>Chiều</th>
          <td id="Thứ 2-Chiều"></td>
          <td id="Thứ 3-Chiều"></td>
          <td id="Thứ 4-Chiều"></td>
          <td id="Thứ 5-Chiều"></td>
          <td id="Thứ 6-Chiều"></td>
          <td id="Thứ 7-Chiều"></td>
          <td id="Chủ nhật-Chiều"></td>
        </tr>
        <tr>
          <th>Tối</th>
          <td id="Thứ 2-Tối"></td>
          <td id="Thứ 3-Tối"></td>
          <td id="Thứ 4-Tối"></td>
          <td id="Thứ 5-Tối"></td>
          <td id="Thứ 6-Tối"></td>
          <td id="Thứ 7-Tối"></td>
          <td id="Chủ nhật-Tối"></td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>

  <script>
    function addSchedule() {
      const name = document.getElementById('name').value.trim();
      const day = document.getElementById('day').value;
      const time = document.getElementById('time').value;
      const topic = document.getElementById('topic').value.trim();

      if (!name || !topic) {
        alert('Vui lòng nhập đầy đủ thông tin!');
        return;
      }

      const cell = document.getElementById(`${day}-${time}`);

      const lesson = document.createElement('div');
      lesson.className = 'lesson';

      lesson.innerHTML = `
        <strong>👤 ${name}</strong>
        <p>📚 ${topic}</p>
        <button class="delete-btn">🗑 Xóa</button>
      `;

      lesson.querySelector('.delete-btn').onclick = () => {
        lesson.remove();
      };

      cell.appendChild(lesson);

      document.getElementById('name').value = '';
      document.getElementById('topic').value = '';
    }
  </script>
</body>
</html>
