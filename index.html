<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thời Khóa Biểu Học Toán</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      overflow-x: auto;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 35px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      color: white;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #c4b5fd, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #cbd5e1;
      font-size: 16px;
    }

    .form-box {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    input, select {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    input:focus,
    select:focus {
      border-color: #a78bfa;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 10px rgba(167,139,250,0.5);
    }

    select option {
      color: black;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .main-btn {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: white;
      box-shadow: 0 5px 15px rgba(99,102,241,0.4);
    }

    .main-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 20px rgba(99,102,241,0.6);
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 20px;
      min-width: 900px;
    }

    th {
      background: rgba(99,102,241,0.35);
      color: white;
      padding: 18px;
      font-size: 16px;
      backdrop-filter: blur(10px);
    }

    td {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px;
      vertical-align: top;
      min-height: 120px;
      height: 120px;
    }

    .lesson {
      background: linear-gradient(135deg, rgba(139,92,246,0.9), rgba(99,102,241,0.9));
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      color: white;
      animation: fadeIn 0.4s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .lesson strong {
      font-size: 15px;
    }

    .lesson p {
      margin-top: 6px;
      font-size: 14px;
      color: #e0e7ff;
    }

    .delete-btn {
      margin-top: 10px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 7px 12px;
      border-radius: 10px;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: rgba(239,68,68,0.9);
    }

    .remove-row-btn {
      background: rgba(239,68,68,0.85);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
      flex-shrink: 0;
    }

    .remove-row-btn:hover {
      transform: scale(1.1);
      background: rgb(220,38,38);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 30px;
      }

      .form-box {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📘 Math Schedule</h1>
    <div class="subtitle">Hệ thống đăng ký thời khóa biểu học Toán hiện đại</div>

    <div class="form-box">
      <input type="text" id="name" placeholder="Nhập tên của bạn" />
    </div>

    <div style="margin-bottom: 20px; color: #cbd5e1; text-align:center;">
      👉 Bấm trực tiếp vào ô để đăng ký lịch học. Có thể tự sửa hoặc thêm khung giờ.
    </div>

    <div style="display:flex; justify-content:center; margin-bottom:25px;">
      <button class="main-btn" onclick="addTimeRow()">➕ Thêm khung giờ</button>
    </div>

    <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>⏰ Thời gian</th>
          <th>Thứ 2</th>
          <th>Thứ 3</th>
          <th>Thứ 4</th>
          <th>Thứ 5</th>
          <th>Thứ 6</th>
          <th>Thứ 7</th>
          <th>Chủ nhật</th>
        </tr>
      </thead>
      <tbody id="scheduleBody">
        <tr>
          <th>
            <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
              <span contenteditable="true" style="outline:none; width:100%;">19:00 - 21:00</span>
              <button class="remove-row-btn">✖</button>
            </div>
          </th>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>

  <script>
    function setupCells() {
      const cells = document.querySelectorAll('td');

      cells.forEach(cell => {
        if (cell.dataset.active) return;

        cell.dataset.active = 'true';
        cell.style.cursor = 'pointer';

        cell.addEventListener('click', () => {
          const existingLesson = cell.querySelector('.lesson');

          // Bấm lần 2 để xóa
          if (existingLesson) {
            existingLesson.remove();
            return;
          }

          const name = document.getElementById('name').value.trim();

          if (!name) {
            alert('Vui lòng nhập tên trước!');
            return;
          }

          const lesson = document.createElement('div');
          lesson.className = 'lesson';

          lesson.innerHTML = `
            <strong>👤 ${name}</strong>
          `;

          cell.appendChild(lesson);
        });
      });
    }

    function addTimeRow() {
      const tbody = document.getElementById('scheduleBody');

      const row = document.createElement('tr');

      row.innerHTML = `
        <th>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <span contenteditable="true" style="outline:none; width:100%;">Nhập giờ học</span>
            <button class="remove-row-btn">✖</button>
          </div>
        </th>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      `;

      tbody.appendChild(row);
      setupCells();
      setupRemoveButtons();
    }

    function setupRemoveButtons() {
      const buttons = document.querySelectorAll('.remove-row-btn');

      buttons.forEach(button => {
        if (button.dataset.active) return;

        button.dataset.active = 'true';

        button.onclick = (e) => {
          e.stopPropagation();

          const row = button.closest('tr');

          if (confirm('Bạn có muốn xóa khung giờ này không?')) {
            row.remove();
          }
        };
      });
    }

    setupCells();
    setupRemoveButtons();
  </script>
</body>
</html>
