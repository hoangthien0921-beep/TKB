<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Schedule</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 35px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 10px;
      background: linear-gradient(90deg,#c4b5fd,#ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      margin-bottom: 20px;
      outline: none;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    button {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .main-btn {
      background: linear-gradient(135deg,#8b5cf6,#6366f1);
      color: white;
      padding: 12px 18px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .main-btn:hover {
      transform: scale(1.03);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
    }

    th {
      background: rgba(99,102,241,0.35);
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    td {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      height: 120px;
      padding: 10px;
      vertical-align: top;
      cursor: pointer;
      transition: 0.3s;
    }

    td:hover {
      background: rgba(255,255,255,0.12);
      transform: scale(1.015);
    }

    .lesson {
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      animation: fadeIn 0.25s ease;
      transition: 0.25s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
      color: white;
      font-weight: 600;
    }

    .lesson:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 10px 25px rgba(139,92,246,0.45);
    }

    .popular-cell {
      background: rgba(250,204,21,0.2) !important;
      border: 2px solid rgba(250,204,21,0.8) !important;
      box-shadow: 0 0 18px rgba(250,204,21,0.55);
      animation: glowPulse 1.8s infinite;
    }

    .remove-row-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(239,68,68,0.9);
      color: white;
      font-size: 14px;
    }

    .remove-row-btn:hover {
      transform: scale(1.1);
    }

    .top-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    @keyframes glowPulse {
      0% {
        box-shadow: 0 0 10px rgba(250,204,21,0.35);
      }

      50% {
        box-shadow:
          0 0 22px rgba(250,204,21,0.95),
          0 0 40px rgba(250,204,21,0.55);
      }

      100% {
        box-shadow: 0 0 10px rgba(250,204,21,0.35);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📘 Math Schedule</h1>

    <div class="subtitle">
      Nhiều người có thể cùng đăng ký lịch học ✨
    </div>

    <input type="text" id="name" placeholder="Nhập tên của bạn" />

    <div class="top-bar">
      <button class="main-btn" onclick="addTimeRow()">
        ➕ Thêm khung giờ
      </button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>⏰ Thời gian</th>
            <th>Thứ 2</th>
            <th>Thứ 3</th>
            <th>Thứ 4</th>
            <th>Thứ 5</th>
            <th>Thứ 6</th>
            <th>Thứ 7</th>
            <th>Chủ nhật</th>
          </tr>
        </thead>

        <tbody id="scheduleBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const scheduleBody = document.getElementById('scheduleBody');

    function createRow(time = '19:00 - 21:00') {
      const row = document.createElement('tr');

      row.innerHTML = `
        <th>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <span contenteditable="true" style="outline:none; width:100%; text-align:left;">
              ${time}
            </span>
            <button class="remove-row-btn">✖</button>
          </div>
        </th>

        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      `;

      scheduleBody.appendChild(row);

      setupCells();
      setupRemoveButtons();
      updatePopularCells();
      saveLocal();
    }

    const userColors = [
      'linear-gradient(135deg,#ec4899,#be185d)',
      'linear-gradient(135deg,#8b5cf6,#6366f1)',
      'linear-gradient(135deg,#06b6d4,#2563eb)',
      'linear-gradient(135deg,#22c55e,#15803d)',
      'linear-gradient(135deg,#f59e0b,#ea580c)',
      'linear-gradient(135deg,#ef4444,#b91c1c)',
      'linear-gradient(135deg,#14b8a6,#0f766e)'
    ];

    function getColorFromName(name) {
      let total = 0;

      for (let i = 0; i < name.length; i++) {
        total += name.charCodeAt(i);
      }

      return userColors[total % userColors.length];
    }

    function setupCells() {
      const cells = document.querySelectorAll('td');

      cells.forEach(cell => {
        if (cell.dataset.ready) return;

        cell.dataset.ready = 'true';

        cell.addEventListener('click', (e) => {
          // Không xử lý nếu bấm vào lesson con
          if (e.target.closest('.lesson')) return;

          const name = document.getElementById('name').value.trim();

          if (!name) {
            alert('Vui lòng nhập tên trước!');
            return;
          }

          const existing = [...cell.querySelectorAll('.lesson')]
            .find(item => item.dataset.name === name);

          // Nếu tên đã tồn tại => bỏ chọn
          if (existing) {
            existing.remove();
            updatePopularCells();
            saveLocal();
            return;
          }

          // Thêm tên mới
          const lesson = document.createElement('div');
          lesson.className = 'lesson';
          lesson.dataset.name = name;
          lesson.style.background = getColorFromName(name);

          lesson.innerHTML = `
            <strong>👤 ${name}</strong>
          `;

          // Cho phép bấm trực tiếp vào tên để bỏ chọn
          lesson.addEventListener('click', (event) => {
            event.stopPropagation();
            lesson.remove();
            updatePopularCells();
            saveLocal();
          });

          cell.appendChild(lesson);

          updatePopularCells();
          saveLocal();
        });
      });
    }

    function setupRemoveButtons() {
      const buttons = document.querySelectorAll('.remove-row-btn');

      buttons.forEach(button => {
        if (button.dataset.ready) return;

        button.dataset.ready = 'true';

        button.onclick = (e) => {
          e.stopPropagation();

          const row = button.closest('tr');

          if (confirm('Bạn có muốn xóa khung giờ này không?')) {
            row.remove();
            updatePopularCells();
            saveLocal();
          }
        });
      });
    }

    function updatePopularCells() {
      const rows = document.querySelectorAll('#scheduleBody tr');

      rows.forEach(row => {
        const cells = row.querySelectorAll('td');

        let max = 0;

        cells.forEach(cell => {
          cell.classList.remove('popular-cell');

          const count = cell.querySelectorAll('.lesson').length;

          if (count > max) {
            max = count;
          }
        });

        if (max === 0) return;

        cells.forEach(cell => {
          const count = cell.querySelectorAll('.lesson').length;

          if (count === max) {
            cell.classList.add('popular-cell');
          }
        });
      });
    }

    function addTimeRow() {
      createRow('Nhập giờ học');
    }

    // Lưu local
    function saveLocal() {
      localStorage.setItem('mathSchedule', scheduleBody.innerHTML);
    }

    function loadLocal() {
      const saved = localStorage.getItem('mathSchedule');

      if (saved) {
        scheduleBody.innerHTML = saved;
      } else {
        createRow();
      }

      setupCells();
      setupRemoveButtons();
      updatePopularCells();
    }

    loadLocal();

    // Tests
    console.assert(typeof createRow === 'function', 'createRow should exist');
    console.assert(typeof setupCells === 'function', 'setupCells should exist');
    console.assert(typeof updatePopularCells === 'function', 'updatePopularCells should exist');
    console.assert(document.getElementById('scheduleBody'), 'scheduleBody should exist');
  </script>
</body>
</html>
